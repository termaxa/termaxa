name: Release

# Tag a version to cut a release:  git tag v0.9.0 && git push --tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: termaxa-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: termaxa-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: termaxa-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: termaxa-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/termaxa ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
      - name: Stage binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/termaxa.exe ${{ matrix.name }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
